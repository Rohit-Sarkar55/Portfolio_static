<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rohit Sarkar — Software Engineer</title>
  <meta name="description" content="Rohit Sarkar — Full Stack Software Engineer at Deloitte. Java, Spring Boot, AWS, Kafka. LeetCode Knight, Top 3% globally." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c14;
      --surface:   #0d1525;
      --card:      #111e33;
      --border:    #1a2d4a;
      --border2:   #243d60;
      --blue:      #3b82f6;
      --blue-dim:  #1d4ed8;
      --blue-glow: rgba(59,130,246,0.18);
      --blue-pale: rgba(59,130,246,0.08);
      --text:      #e2e8f0;
      --muted:     #64748b;
      --muted2:    #94a3b8;
      --mono:      'IBM Plex Mono', monospace;
      --display:   'Syne', sans-serif;
      --body:      'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--blue-dim); border-radius: 2px; }
    ::selection { background: var(--blue); color: #fff; }

    /* ── NAVBAR ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 2rem;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(8,12,20,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: all 0.3s;
    }
    .nav-logo {
      font-family: var(--display); font-weight: 800; font-size: 1.1rem;
      color: var(--text); text-decoration: none; letter-spacing: -0.02em;
    }
    .nav-logo span { color: var(--blue); }
    .nav-links { display: flex; gap: 0.25rem; }
    .nav-links a {
      font-family: var(--mono); font-size: 0.72rem; color: var(--muted);
      text-decoration: none; padding: 0.4rem 0.75rem; border-radius: 6px;
      transition: all 0.2s; letter-spacing: 0.03em;
    }
    .nav-links a:hover { color: var(--blue); background: var(--blue-pale); }
    .nav-hire {
      font-family: var(--mono); font-size: 0.72rem; font-weight: 500;
      color: var(--blue); border: 1px solid var(--blue);
      background: var(--blue-pale); padding: 0.4rem 1rem;
      border-radius: 6px; text-decoration: none; transition: all 0.2s;
      letter-spacing: 0.03em;
    }
    .nav-hire:hover { background: var(--blue); color: #fff; }

    /* ── SECTIONS ── */
    section { max-width: 1000px; margin: 0 auto; padding: 5rem 2rem; }

    /* ── HERO ── */
    #hero {
      min-height: 100vh; display: flex; flex-direction: column;
      justify-content: center; padding-top: 80px; position: relative;
      max-width: 100%; padding-left: 10vw; padding-right: 10vw;
    }
    .hero-grid {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .hero-glow {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 800px; height: 400px; pointer-events: none;
      background: radial-gradient(ellipse at center top, rgba(59,130,246,0.12) 0%, transparent 70%);
    }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-family: var(--mono); font-size: 0.72rem; color: var(--blue);
      background: var(--blue-pale); border: 1px solid rgba(59,130,246,0.3);
      padding: 0.35rem 0.85rem; border-radius: 100px; margin-bottom: 1.5rem;
      letter-spacing: 0.05em; width: fit-content;
    }
    .hero-tag::before {
      content: ''; width: 6px; height: 6px; background: var(--blue);
      border-radius: 50%; animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .hero-name {
      font-family: var(--display); font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 800; line-height: 0.95; letter-spacing: -0.03em;
      color: var(--text); margin-bottom: 1rem;
    }
    .hero-name .blue { color: var(--blue); }
    .hero-role {
      font-family: var(--display); font-size: clamp(1rem, 2.5vw, 1.3rem);
      font-weight: 400; color: var(--muted2); margin-bottom: 1.5rem;
      letter-spacing: -0.01em;
    }
    .hero-desc {
      max-width: 560px; color: var(--muted); line-height: 1.7;
      font-size: 0.95rem; margin-bottom: 2.5rem;
    }
    .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 3rem; }
    .btn-primary {
      font-family: var(--mono); font-size: 0.78rem; font-weight: 500;
      color: #fff; background: var(--blue);
      padding: 0.7rem 1.5rem; border-radius: 8px; text-decoration: none;
      transition: all 0.2s; letter-spacing: 0.02em; border: none; cursor: pointer;
      display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-primary:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(59,130,246,0.35); }
    .btn-outline {
      font-family: var(--mono); font-size: 0.78rem; font-weight: 500;
      color: var(--blue); background: transparent;
      border: 1px solid var(--border2); padding: 0.7rem 1.5rem;
      border-radius: 8px; text-decoration: none; transition: all 0.2s;
      letter-spacing: 0.02em; cursor: pointer;
      display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-outline:hover { border-color: var(--blue); background: var(--blue-pale); }
    .hero-stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; background: var(--border);
      border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; max-width: 560px;
    }
    .stat {
      background: var(--card); padding: 1rem 1.25rem; text-align: center;
    }
    .stat-val {
      font-family: var(--display); font-size: 1.6rem; font-weight: 800;
      color: var(--blue); letter-spacing: -0.03em; line-height: 1;
    }
    .stat-label {
      font-family: var(--mono); font-size: 0.62rem; color: var(--muted);
      margin-top: 0.35rem; letter-spacing: 0.04em; line-height: 1.3;
    }

    /* ── SECTION HEADER ── */
    .sec-eyebrow {
      font-family: var(--mono); font-size: 0.68rem; color: var(--blue);
      letter-spacing: 0.12em; text-transform: uppercase;
      display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem;
    }
    .sec-eyebrow::before, .sec-eyebrow::after {
      content: ''; flex: 0 0 24px; height: 1px; background: var(--blue);
    }
    .sec-title {
      font-family: var(--display); font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 800; letter-spacing: -0.03em; margin-bottom: 0.5rem;
    }
    .sec-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 3rem; }

    /* ── SKILLS ── */
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
    .skill-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.25rem 1.5rem;
      transition: border-color 0.2s;
    }
    .skill-card:hover { border-color: var(--border2); }
    .skill-cat {
      font-family: var(--mono); font-size: 0.68rem; color: var(--blue);
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.85rem;
    }
    .skill-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .tag {
      font-family: var(--mono); font-size: 0.7rem;
      background: var(--blue-pale); color: var(--muted2);
      border: 1px solid var(--border2); padding: 0.25rem 0.6rem;
      border-radius: 4px; letter-spacing: 0.02em;
    }

    /* ── EXPERIENCE TIMELINE ── */
    .timeline { position: relative; padding-left: 1.5rem; }
    .timeline::before {
      content: ''; position: absolute; left: 0; top: 6px; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, var(--blue), rgba(59,130,246,0.1));
    }
    .exp-item { position: relative; margin-bottom: 2.5rem; }
    .exp-dot {
      position: absolute; left: -1.875rem; top: 4px;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--blue); border: 2px solid var(--bg);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }
    .exp-dot.active {
      animation: glow-dot 2s ease-in-out infinite;
    }
    @keyframes glow-dot {
      0%,100% { box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
      50% { box-shadow: 0 0 0 6px rgba(59,130,246,0.1), 0 0 12px rgba(59,130,246,0.3); }
    }
    .exp-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem;
      transition: border-color 0.2s;
    }
    .exp-card:hover { border-color: var(--border2); }
    .exp-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .exp-title { font-family: var(--display); font-weight: 700; font-size: 1rem; letter-spacing: -0.01em; }
    .exp-company { color: var(--blue); font-size: 0.85rem; font-weight: 500; margin-top: 0.2rem; }
    .exp-meta { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); text-align: right; line-height: 1.6; }
    .exp-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin: 0.85rem 0; }
    .exp-bullets { list-style: none; padding: 0; }
    .exp-bullets li {
      font-size: 0.85rem; color: var(--muted2); line-height: 1.65;
      padding: 0.3rem 0; padding-left: 1.1rem; position: relative;
    }
    .exp-bullets li::before {
      content: '▸'; position: absolute; left: 0;
      color: var(--blue); font-size: 0.65rem; top: 0.45rem;
    }
    strong { color: var(--text); font-weight: 600; }

    /* ── PROJECTS ── */
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 1.25rem; }
    .project-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem; display: flex;
      flex-direction: column; transition: all 0.25s; position: relative; overflow: hidden;
    }
    .project-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 2px; background: linear-gradient(90deg, var(--blue), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .project-card:hover { border-color: var(--border2); transform: translateY(-3px); }
    .project-card:hover::before { opacity: 1; }
    .project-cat {
      font-family: var(--mono); font-size: 0.62rem; color: var(--muted);
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.75rem;
    }
    .project-title { font-family: var(--display); font-weight: 700; font-size: 1.05rem; letter-spacing: -0.01em; margin-bottom: 0.65rem; }
    .project-desc { font-size: 0.83rem; color: var(--muted); line-height: 1.65; flex: 1; margin-bottom: 1rem; }
    .project-footer { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; padding-top: 1rem; border-top: 1px solid var(--border); }
    .project-links { display: flex; gap: 0.75rem; }
    .project-link {
      font-family: var(--mono); font-size: 0.68rem; color: var(--blue);
      text-decoration: none; display: flex; align-items: center; gap: 0.3rem;
      transition: color 0.2s;
    }
    .project-link:hover { color: #93c5fd; }

    /* ── ACHIEVEMENTS ── */
    .achieve-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
    .achieve-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.25rem; transition: border-color 0.2s;
    }
    .achieve-card:hover { border-color: var(--border2); }
    .achieve-icon { font-size: 1.5rem; margin-bottom: 0.75rem; }
    .achieve-val { font-family: var(--display); font-size: 1.3rem; font-weight: 800; color: var(--blue); letter-spacing: -0.02em; }
    .achieve-title { font-family: var(--display); font-size: 0.85rem; font-weight: 600; margin: 0.2rem 0; }
    .achieve-sub { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); }

    /* ── CERTIFICATIONS ── */
    .certs-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .cert-item {
      display: flex; align-items: center; gap: 1rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem 1.25rem; transition: border-color 0.2s;
    }
    .cert-item:hover { border-color: var(--border2); }
    .cert-badge {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--blue-pale); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .cert-name { font-family: var(--display); font-size: 0.9rem; font-weight: 600; }
    .cert-issuer { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); margin-top: 0.2rem; }

    /* ── CONTACT ── */
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
    .contact-links { display: flex; flex-direction: column; gap: 0.75rem; }
    .contact-link {
      display: flex; align-items: center; gap: 0.85rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.9rem 1.1rem;
      text-decoration: none; color: var(--text); transition: all 0.2s;
    }
    .contact-link:hover { border-color: var(--blue); transform: translateX(4px); }
    .contact-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--blue-pale); display: flex; align-items: center;
      justify-content: center; font-size: 0.9rem; flex-shrink: 0;
    }
    .contact-label { font-family: var(--mono); font-size: 0.62rem; color: var(--muted); }
    .contact-val { font-size: 0.82rem; font-weight: 500; }
    .contact-form { display: flex; flex-direction: column; gap: 1rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    input, textarea {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.75rem 1rem; color: var(--text);
      font-family: var(--body); font-size: 0.85rem; outline: none;
      transition: border-color 0.2s;
    }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    input:focus, textarea:focus { border-color: var(--blue); }
    textarea { resize: vertical; min-height: 120px; }
    .form-label { font-family: var(--mono); font-size: 0.62rem; color: var(--muted); margin-bottom: 0.4rem; display: block; letter-spacing: 0.05em; }
    .send-btn {
      font-family: var(--mono); font-size: 0.78rem; font-weight: 500;
      color: #fff; background: var(--blue); border: none; cursor: pointer;
      padding: 0.8rem; border-radius: 8px; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .send-btn:hover { background: #2563eb; }
    .send-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── RESUME ── */
    .resume-wrapper {
      display: flex; flex-direction: column; align-items: center;
      gap: 2rem;
    }
    .resume-preview {
      width: 100%; max-width: 680px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      transition: border-color 0.2s;
    }
    .resume-preview:hover { border-color: var(--border2); }
    .resume-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .resume-dots { display: flex; gap: 0.4rem; }
    .resume-dots span {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .resume-filename {
      font-family: var(--mono); font-size: 0.68rem; color: var(--muted);
    }
    .resume-actions { display: flex; gap: 0.75rem; }
    .resume-content {
      padding: 2rem 2.5rem;
      font-family: var(--body); font-size: 0.78rem;
      color: var(--muted2); line-height: 1.7;
    }
    .resume-name {
      font-family: var(--display); font-weight: 800;
      font-size: 1.4rem; color: var(--text);
      letter-spacing: -0.02em; text-align: center; margin-bottom: 0.3rem;
    }
    .resume-contact {
      font-family: var(--mono); font-size: 0.62rem;
      color: var(--muted); text-align: center; margin-bottom: 1.5rem;
      line-height: 1.8;
    }
    .resume-section-title {
      font-family: var(--mono); font-size: 0.65rem; font-weight: 600;
      color: var(--blue); letter-spacing: 0.1em; text-transform: uppercase;
      border-bottom: 1px solid var(--border); padding-bottom: 0.3rem;
      margin: 1.25rem 0 0.75rem;
    }
    .resume-row {
      display: flex; justify-content: space-between;
      align-items: baseline; gap: 1rem; flex-wrap: wrap;
    }
    .resume-job-title { font-weight: 600; color: var(--text); font-size: 0.8rem; }
    .resume-company { color: var(--muted2); font-size: 0.75rem; }
    .resume-date { font-family: var(--mono); font-size: 0.62rem; color: var(--muted); flex-shrink: 0; }
    .resume-bullet { padding-left: 1rem; position: relative; margin-bottom: 0.2rem; }
    .resume-bullet::before { content: '–'; position: absolute; left: 0; color: var(--blue); }
    .resume-skill-row { margin-bottom: 0.3rem; }
    .resume-skill-row strong { color: var(--muted2); }
    .resume-blur {
      position: relative; overflow: hidden; border-radius: 0 0 16px 16px;
    }
    .resume-blur::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to bottom, transparent, var(--card));
      pointer-events: none;
    }
    .resume-cta {
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
    }
    .resume-cta-text {
      font-family: var(--mono); font-size: 0.72rem; color: var(--muted); text-align: center;
    }
    .resume-dl-btn {
      display: inline-flex; align-items: center; gap: 0.6rem;
      font-family: var(--mono); font-size: 0.82rem; font-weight: 600;
      color: #fff; background: var(--blue);
      padding: 0.85rem 2.5rem; border-radius: 10px;
      text-decoration: none; transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(59,130,246,0.35);
    }
    .resume-dl-btn:hover {
      background: #2563eb; transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(59,130,246,0.45);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border); padding: 2rem;
      text-align: center; font-family: var(--mono);
      font-size: 0.68rem; color: var(--muted);
    }

    /* ── FADE IN ── */
    .fade-in {
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hero-stats { grid-template-columns: repeat(2, 1fr); }
      .contact-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      #hero { padding-left: 1.5rem; padding-right: 1.5rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── DATA ─────────────────────────────────────────────────────
    const DATA = {
      skills: [
        { cat: 'Languages',      items: ['Java','Python','C/C++','JavaScript','TypeScript','HTML','CSS'] },
        { cat: 'Frameworks',     items: ['Spring Boot','Spring AI','Spring Security','Angular','React','Node.js','FastAPI','Kafka'] },
        { cat: 'Databases',      items: ['PostgreSQL','MySQL','TimescaleDB','MongoDB'] },
        { cat: 'Cloud / DevOps', items: ['AWS EC2','AWS S3','AWS RDS','IAM','CloudWatch','Docker','Jenkins','CI/CD','Git'] },
        { cat: 'Testing',        items: ['JUnit','Mockito','Postman','Insomnia','SoapUI','DevTools'] },
        { cat: 'Concepts',       items: ['Microservices','Distributed Systems','REST APIs','OOP','System Design','DSA','OAuth2','HIPAA','Agile'] },
      ],
      experience: [
        {
          title:   'Software Engineer / Full Stack Developer',
          company: 'Deloitte',
          loc:     'Bengaluru, India',

    function useFadeIn() {
      const ref = useRef(null);
      useEffect(() => {
        const obs = new IntersectionObserver(
          ([e]) => { if (e.isIntersecting) e.target.classList.add('visible'); },
          { threshold: 0.1 }
        );
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      return ref;
    }
